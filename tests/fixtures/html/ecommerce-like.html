<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интернет-магазин — каталог товаров</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <nav>
            <a href="/catalog">Каталог</a>
            <a href="/cart" class="cart-link">Корзина</a>
        </nav>
    </header>

    <main>
        <section class="catalog">
            <h1>Каталог товаров</h1>

            <div class="product">
                <h2>Кружка керамическая</h2>
                <p class="price">450 ₽</p>
                <button class="add-to-cart">Купить</button>
            </div>

            <div class="product">
                <h2>Тетрадь A5</h2>
                <p class="price">120 руб</p>
                <button class="add-to-cart">В корзину</button>
            </div>

            <div class="product">
                <h2>Набор ручек</h2>
                <p class="price">890 ₽</p>
                <button class="add-to-cart">Оформить заказ</button>
            </div>
        </section>

        <aside class="basket">
            <h3>Корзина (3 товара)</h3>
            <a href="/cart/checkout">Перейти к оформлению</a>
        </aside>
    </main>

    <footer>
        <a href="/privacy">Политика обработки персональных данных</a>
        <a href="/oferta">Публичная оферта</a>
        <a href="/contacts">Контакты</a>
    </footer>
</body>
</html>
